<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutManager - Gestão de Futebol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#10b981', // Emerald 500
                        secondary: '#1e293b', // Slate 800
                        dark: '#0f172a',
                        card: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
/* Custom CSS for micro-animations and specific tweaks */
body {
    -webkit-tap-highlight-color: transparent;
}

.glass-panel {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: black (10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.fade-in {
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Custom Scrollbar for a premium look */
::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}

::-webkit-scrollbar-track {
    background: #0f172a;
}

::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
    background: #475569;
}

.btn-primary {
    @apply bg-primary hover:bg-emerald-400 text-white font-semibold py-2 px-4 rounded-lg shadow-lg shadow-emerald-500/30 transition-all duration-200 transform hover:-translate-y-0.5 active:translate-y-0;
}

.btn-secondary {
    @apply bg-slate-700 hover:bg-slate-600 text-white font-semibold py-2 px-4 rounded-lg transition-all duration-200;
}

.btn-danger {
    @apply bg-red-500 hover:bg-red-400 text-white font-semibold py-2 px-4 rounded-lg shadow-lg shadow-red-500/30 transition-all duration-200;
}

.input-field {
    @apply w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-slate-100 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors;
}

.input-field option {
    @apply text-slate-100 bg-slate-800;
}

.nav-link {
    @apply flex flex-col items-center justify-center py-2 px-4 text-slate-400 hover:text-primary transition-colors text-xs font-medium w-full;
}

.nav-link.active {
    @apply text-primary relative;
}

.nav-link.active::after {
    content: '';
    @apply absolute top-0 w-8 h-1 bg-primary rounded-b-full;
}
    </style>
</head>
<body class="bg-dark text-slate-200 font-sans min-h-screen flex flex-col">
    <div id="app" class="flex flex-col flex-1 h-full"></div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
